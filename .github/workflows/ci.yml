name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://iisl:ci_pg_${{ github.run_id }}_${{ github.run_attempt }}@127.0.0.1:5432/iisl
      POSTGRES_USER: iisl
      POSTGRES_PASSWORD: ci_pg_${{ github.run_id }}_${{ github.run_attempt }}
      POSTGRES_DB: iisl
      POSTGRES_PORT: "5432"
      API_PORT: "3001"
      API_HOST: 127.0.0.1
      OPERATOR_TOKEN: ci_operator_${{ github.run_id }}_${{ github.run_attempt }}
      AGENT_TOKEN: ci_agent_${{ github.run_id }}_${{ github.run_attempt }}
      WORKER_POLL_INTERVAL_MS: "2000"
      WORKER_MAX_ATTEMPTS: "5"
      USE_ZENDESK_SIMULATOR: "true"
      USE_STRIPE_SIMULATOR: "true"
      USE_SHOPIFY_SIMULATOR: "true"
      VITE_API_BASE_URL: http://localhost:3001
      SIDEBAR_PORT: "5173"
      LOG_LEVEL: info
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enforce no .env file policy
        run: |
          if [ -f .env ]; then
            echo ".env file detected in repository workspace"
            exit 1
          fi

      - name: Enforce public-safe defaults policy
        run: |
          legacy_operator="operator-token"
          legacy_operator="${legacy_operator}-dev"
          legacy_agent="agent-token"
          legacy_agent="${legacy_agent}-dev"
          legacy_pg="iisl"
          legacy_pg="${legacy_pg}_dev"
          open_bind="0.0.0."
          open_bind="${open_bind}0"
          banned_pattern="${legacy_operator}|${legacy_agent}|${legacy_pg}|API_HOST=${open_bind}|process\\.env\\.API_HOST \\?\\? \\\"${open_bind}\\\"|POSTGRES_PASSWORD:-${legacy_pg}"
          if rg --hidden --glob '!.git' -n -e "$banned_pattern" .; then
            echo "Banned public-default literals detected."
            exit 1
          fi

      - name: Start demo services
        run: |
          mkdir -p .tmp/ci-logs
          npm run demo:start > .tmp/ci-logs/demo-start.log 2>&1 &
          echo $! > .tmp/demo-start.pid

      - name: Wait for API readiness
        run: |
          for i in {1..120}; do
            if curl -fsS "http://127.0.0.1:${API_PORT}/health" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time on port ${API_PORT}"
          tail -n 300 .tmp/ci-logs/demo-start.log || true
          exit 1

      - name: Run smoke tests
        run: npm run demo:smoke

      - name: Stop services
        if: always()
        run: |
          if [ -f .tmp/demo-start.pid ]; then
            kill "$(cat .tmp/demo-start.pid)" || true
          fi
          npm run infra:down || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: .tmp/ci-logs
