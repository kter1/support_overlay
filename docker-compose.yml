# IISL Phase 1 — Local Infrastructure
# Version-pinned images — no floating tags.
#
# No Redis — outbox worker uses DB polling, not Redis queues.
# If Redis is added in a future phase, add a redis service here
# and update scripts/demo-start.ts to add a Redis health wait.

services:
  postgres:
    # Pinned: 15.6-alpine3.19. To upgrade: change tag here and in .nvmrc comment.
    image: postgres:15.6-alpine3.19
    restart: unless-stopped
    ports:
      # POSTGRES_PORT allows overriding 5432 if you have a local conflict.
      # If changed, update DATABASE_URL in your shell environment to match.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-iisl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:-iisl}
    volumes:
      - iisl_pgdata:/var/lib/postgresql/data
    healthcheck:
      # Checks both that the server is running AND that the target DB is accessible.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iisl} -d ${POSTGRES_DB:-iisl}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  iisl_pgdata:
    driver: local
